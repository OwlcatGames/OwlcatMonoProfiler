# Example native-hook config for Owlcat Mono Profiler.
#
# Enable "Track native heap" in the Run dialog and point it at a file like this to
# profile native (non-Mono) allocations. Each line describes one function to hook:
#
#     module | target | role | argmap | label
#
#   module : the DLL the function lives in (e.g. UnityPlayer.dll, GameAssembly.dll)
#   target : the function's decorated name, resolved through the module's PDB (which the
#            profiler already requires next to the game exe) -- OR a relative virtual
#            address written as +0xHEX (from the module base) if you don't want to rely
#            on symbols.
#   role   : alloc | realloc | free
#   argmap : comma-separated key=value pairs.
#              keys : size, ptr, oldptr
#              vals : a1..a4  (the 1st..4th integer/pointer argument -- RCX,RDX,R8,R9 on
#                              x64; for a member function 'this' is a1, so a real size is
#                              usually a2), or 'ret' (the return value).
#            alloc : needs 'size', and 'ptr' (defaults to ret).
#            free  : needs 'ptr'.
#            realloc: needs 'oldptr', 'size', and 'ptr' (defaults to ret).
#   label  : quoted display name; becomes the allocation "type" in the UI.
#
# Limitations (x64): the target must take at most 4 integer/pointer arguments in
# registers and return the pointer in RAX. Functions with more arguments, by-value
# struct/float arguments, or an out-parameter pointer are not supported. Up to 128 hooks.
#
# The function names below are PLACEHOLDERS -- fill in the real decorated names (or RVAs)
# for your Unity version from your own disassembly / symbols.

# UnityPlayer.dll | ?AllocInternal@MemoryManager@@... | alloc   | size=a2, ptr=ret            | "Unity Alloc"
# UnityPlayer.dll | ?ReallocInternal@MemoryManager@@...| realloc | oldptr=a2, size=a3, ptr=ret | "Unity Realloc"
# UnityPlayer.dll | ?FreeInternal@MemoryManager@@...   | free    | ptr=a2                      | "Unity Free"

# --- CRT allocators (allocations from non-Unity native code: plugins, middleware) ---
#
# malloc/free/realloc are exported from ucrtbase.dll, so they resolve by name with no PDB.
# Hooking these ALONGSIDE the Unity allocators above is safe and does NOT double-count:
# allocations are attributed to the outermost hooked function, so when a Unity allocator
# calls malloc internally it's recorded once as "Unity", and only mallocs that don't pass
# through a hooked Unity allocator show up as "CRT malloc". (The profiler excludes its own
# threads, so it never records its own CRT usage.)

# ucrtbase.dll | malloc  | alloc   | size=a1, ptr=ret            | "CRT malloc"
# ucrtbase.dll | free    | free    | ptr=a1                      | "CRT free"
# ucrtbase.dll | realloc | realloc | oldptr=a1, size=a2, ptr=ret | "CRT realloc"
# ucrtbase.dll | calloc  | alloc   | size=a1*a2, ptr=ret         | "CRT calloc"

# Notes:
# - calloc must be hooked separately: in the UCRT it does NOT call malloc (it goes straight
#   to HeapAlloc with zero-init), so a malloc hook won't see it. Its size is count*element
#   size, expressed as "size=a1*a2".
# - operator new lives in the C++ runtime (often msvcp140.dll, or static in the exe/
#   GameAssembly.dll). Hook it by its decorated name if you want C++ allocations separately,
#   e.g.  <module> | ??2@YAPEAX_K@Z | alloc | size=a1, ptr=ret | "operator new"
#   If both operator new and malloc are hooked, new's internal malloc is not double-counted.

# --- Windows heap (catches native allocations that don't go through the CRT: many plugins,
#     middleware, and Unity's own lower-level allocations) ---
#
# HeapAlloc/HeapReAlloc/HeapFree are exported from kernel32.dll (resolve by name, no PDB).
# The default process heap and the CRT heap are both Windows heaps, so this catches a lot.
# Attribution is still by outermost hooked frame: HeapAllocs made by a hooked Unity allocator
# or hooked malloc are counted under those, not double-counted here.

# kernel32.dll | HeapAlloc   | alloc   | size=a3, ptr=ret            | "HeapAlloc"
# kernel32.dll | HeapReAlloc | realloc | oldptr=a3, size=a4, ptr=ret | "HeapReAlloc"
# kernel32.dll | HeapFree    | free    | ptr=a3                      | "HeapFree"

# For the widest coverage, hook the ntdll routines everything ultimately funnels into
# (RtlAllocateHeap has the same argument order as HeapAlloc). Note this is extremely hot.
# ntdll.dll | RtlAllocateHeap | alloc | size=a3, ptr=ret | "RtlAllocateHeap"
# ntdll.dll | RtlFreeHeap     | free  | ptr=a3           | "RtlFreeHeap"

# --- VirtualAlloc / VirtualFree: the page-commit view (committed physical memory) ---
#
# This is the total physical memory the process commits from the OS. On a Unity build it's
# usually the dominant figure - allocators like DynamicHeapAllocator reserve large pools via
# VirtualAlloc and sub-allocate from them, so most memory is committed here, "below" the
# allocators. To see it accurately, use two features:
#
#   if=a3&MASK    - VirtualAlloc's a3 is flAllocationType, VirtualFree's a3 is dwFreeType.
#                   Recording only MEM_COMMIT (0x1000) / MEM_DECOMMIT|MEM_RELEASE (0xC000)
#                   tracks committed physical pages, not merely reserved address space (a pure
#                   MEM_RESERVE commits nothing and is skipped).
#   plane=reserve - puts these on the reservation plane, so they still record when they fire
#                   INSIDE an allocator hook (the normal case). Without it, the topmost-caller
#                   rule would attribute the VirtualAlloc to the allocator and you'd never see
#                   the pages (this is why hooking VirtualAlloc alongside the allocators
#                   previously showed almost nothing).

# kernel32.dll | VirtualAlloc | alloc | size=a2, ptr=ret, if=a3&0x1000, plane=reserve | "VirtualAlloc (commit)"
# kernel32.dll | VirtualFree  | free  | ptr=a1, if=a3&0xC000, plane=reserve           | "VirtualFree"

# IMPORTANT - the reservation plane OVERLAPS the allocation plane: the committed pages contain
# the allocations the allocator hooks report. So when you hook both, DON'T sum the grand total
# (it double-counts the same physical memory). Read them per-type instead: the "VirtualAlloc
# (commit)" type is the committed-pages view (with callstacks showing which subsystem commits
# them), and the allocator types are the handed-out view. The committed line on the size graph
# (process commit, independent of any hook) remains the ground-truth total.
#
# Still approximate at the edges: a partial MEM_DECOMMIT frees by the recorded commit's size,
# and a MEM_RELEASE only matches a commit recorded at that exact base - fine for pool allocators
# that decommit per-block, coarse for hand-rolled reserve/commit schemes.

# WARNING - HeapAlloc, RtlAllocateHeap and VirtualAlloc are far hotter than Unity's own
# allocators (they back malloc, operator new and much of Windows itself). Hooking them adds
# noticeably more overhead and many more events. Prefer the narrowest hook that captures
# what you actually need.
